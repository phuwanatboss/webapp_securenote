<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureNote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #f8f9ff, #eef1ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 18px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 500;
            color: #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #7b8cff;
            box-shadow: 0 0 5px rgba(123,140,255,0.3);
        }

        button {
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .add-btn {
            background: #7b8cff;
            color: white;
        }

        .add-btn:hover {
            transform: scale(1.05);
        }

        ul {
            margin-top: 20px;
            padding: 0;
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        li {
            background: #f9f9ff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            border: 1px solid #eee;
        }

        li:hover {
            background: #f1f3ff;
        }

        .actions button {
            margin-left: 5px;
            font-size: 12px;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
        }

        .edit-btn {
            background: #4dabf7;
            color: white;
        }

        .delete-btn:hover {
            transform: scale(1.05);
        }

        .edit-btn:hover {
            transform: scale(1.05);
        }

        /* Scrollbar */
        ul::-webkit-scrollbar {
            width: 6px;
        }

        ul::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 SecureNote</h1>

    <div class="input-group">
        <input id="noteInput" placeholder="Write your note..." 
               onkeydown="if(event.key==='Enter') addNote()" />
        <button class="add-btn" onclick="addNote()">Add</button>
    </div>

    <ul id="noteList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
